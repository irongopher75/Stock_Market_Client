<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Market Dashboard</title>
  <script>
    function sendError(error) {
      fetch('http://localhost:9999/', {
        method: 'POST',
        body: error
      }).catch(e => console.error(e));
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:99999;background:red;color:white;padding:20px;font-family:monospace;white-space:pre-wrap;">' + error + '</div>';
    }
    window.addEventListener('error', function (e) {
      sendError(e.error ? e.error.stack : e.message);
    });
    window.addEventListener('unhandledrejection', function (e) {
      sendError(e.reason && e.reason.stack ? e.reason.stack : e.reason);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
